<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>論理・表現 テスト対策クイズ</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- Status Bar -->
        <div id="status-bar" class="status-bar">
            <div class="status-item">Lv. <span id="status-level" class="level-normal">1</span></div>
            <div class="status-item">EXP: <span id="status-exp">0</span></div>
        </div>

        <header>
            <h1>📘 論理・表現 テスト対策クイズ ✒️</h1>
        </header>

        <!-- Main Menu -->
        <main id="menu-screen" class="screen">
            <section class="selection">
                <h2>出題分野を選択してください</h2>

                <div class="level-up-container">
                    <button id="level-up-btn" class="primary-btn pulse-glow">レベルアップ！ (現在EXPで可能な限り上昇)</button>
                    <p id="level-up-msg" class="level-msg-hidden"></p>
                </div>
                <div class="reset-container">
                    <button id="reset-progress-btn" class="reset-btn">🗑️ 問題の進捗をリセット</button>
                </div>

                <div id="work-list" class="grid-container">
                    <!-- Works will be injected here -->
                </div>
            </section>
        </main>

        <!-- Quiz Screen -->
        <main id="quiz-screen" class="screen hidden">
            <div class="quiz-header">
                <span id="quiz-part-title">分野名</span>
                <div class="progress-container">
                    <div id="progress-bar"></div>
                </div>
                <span id="question-number">1 / 5</span>
                <button id="quiz-back-btn" class="secondary-btn small">戻る</button>
            </div>

            <div class="question-container">
                <p id="question-text">ここに問題が表示されます</p>
            </div>

            <div id="options-container" class="options-grid">
                <!-- Options will be injected here -->
            </div>

            <div id="feedback-container" class="feedback-area hidden">
                <div id="answer-result">正解！</div>
                <div id="explanation-text">解説がここに表示されます。</div>
                <button id="next-btn" class="primary-btn">次の問題へ</button>
            </div>
        </main>

        <!-- Result Screen -->
        <main id="result-screen" class="screen hidden">
            <div class="result-card">
                <h2>結果発表</h2>
                <div class="score-display">
                    <span id="final-score">0</span> / <span id="total-questions">0</span>
                </div>
                <!-- 今回ラウンドのゲージ -->
                <div class="result-gauge-wrap">
                    <div class="result-gauge-bg">
                        <div id="result-gauge-fill" class="result-gauge-fill"></div>
                    </div>
                    <div class="result-gauge-label" id="result-gauge-label"></div>
                </div>
                <p id="result-message">お疲れ様でした！</p>
                <div class="result-actions">
                    <button id="retry-btn" class="primary-btn">同じ分野を解き直す</button>
                    <button id="menu-btn" class="secondary-btn">メニューに戻る</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 論理・表現テスト対策アプリ</p>
        </footer>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>

</html>
